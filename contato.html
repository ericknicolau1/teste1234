<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Meu Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav>
      <a href="index.html" class="logo">MeuSite</a>
      <button class="menu-toggle" aria-label="Menu">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="servicos.html">Serviços</a></li>
        <li><a href="galeria.html">Galeria</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Contato</h1>
    <p>Entre em contato conosco. Ficaremos felizes em ajudar!</p>
  </section>

  <section class="section">
    <h2>Envie uma Mensagem</h2>
    <div class="form-container">
      <form id="contactForm">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>

        <label for="assunto">Assunto</label>
        <input type="text" id="assunto" placeholder="Assunto da mensagem" required>

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem..." required></textarea>

        <button type="submit" class="btn">Enviar</button>
      </form>
    </div>
  </section>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Aviso</h3>
      <p id="modalText"></p>
      <button class="btn" onclick="closeModal()">Fechar</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 MeuSite. Todos os direitos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
